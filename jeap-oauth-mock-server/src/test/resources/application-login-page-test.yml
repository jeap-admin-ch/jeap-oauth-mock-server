spring:
  application:
    name: test

# Two users so the browser test can switch the username dropdown and trigger the change handler from login.js.

oauth-mock-data:
  clients:
    - client-id: "test-client"
      registered-redirect-uri: "http://localhost/redirect"
      userroles: [ "userrole" ]
      context: "USER"
      audience: [ "example-resource" ]
      scope: [ "openid" ]

  users:
    - id: "user"
      given-name: "Henriette"
      family-name: "Muster"
      locale: "DE"
      preferred-username: "12345"
      ext-id: "56789"
      login-level: "S1+OK"

    - id: "another-user"
      given-name: "Henry"
      family-name: "Muster"
      locale: "DE"
      preferred-username: "67890"
      ext-id: "12345"
      login-level: "S1+OK"
